name: "Update changelog"
on:
  push:
    branches:
      - "master"
      - "main"

permissions:
  contents: write

jobs:
  update-changelog:
    if: startsWith(github.event.head_commit.message, 'Bump version:')
    runs-on: ubuntu-latest
    name: Update CHANGELOG.md after version bump
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BUMPVERSION_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git author
        run: |
          git config user.name "${{ secrets.BUMPVERSION_AUTHOR }}"
          git config user.email "${{ secrets.BUMPVERSION_EMAIL }}"

      - name: Update changelog
        run: python -m cg.utils.changelog --update-existing CHANGELOG.md

      - name: Detect changelog changes
        id: changelog
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changelog update
        if: steps.changelog.outputs.changed == 'true'
        run: |
          version=$(python -c "import pathlib, re; print(re.search(r'current_version = ([^\\n]+)', pathlib.Path('.bumpversion.cfg').read_text()).group(1))")
          git add CHANGELOG.md
          git commit -m "Update changelog: ${version} [skip ci]"

      - name: Push changelog update
        if: steps.changelog.outputs.changed == 'true'
        run: git push
